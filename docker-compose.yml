version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb-ha:pg15-latest
    environment:
      - POSTGRES_DB=cctv
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  timescaledb_data:
